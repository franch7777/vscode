<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oakland Map Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Courier Prime', 'Courier New', monospace;
    background: #0d0d0b;
    color: #f0ede6;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    min-height: 380px;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background-image: url('https://raw.githubusercontent.com/franch7777/vscode/main/lib/back.png');
    background-size: cover;
    background-position: center;
    filter: brightness(0.45) saturate(0.7);
    transform: scale(1.04);
    transition: transform 8s ease;
  }
  .hero:hover .hero-bg { transform: scale(1.0); }
  .hero-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(13,13,11,0.05) 0%, rgba(13,13,11,0.9) 100%);
  }
  .hero-content {
    position: relative; z-index: 2;
    padding: 2.5rem 2.5rem 2.5rem;
    max-width: 900px;
    animation: fadeUp 0.9s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .hero-tag {
    display: inline-block;
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #9FE1CB;
    border: 0.5px solid #1D9E75;
    border-radius: 2px;
    padding: 4px 10px;
    margin-bottom: 1.1rem;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 6vw, 4.2rem);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -1px;
    color: #f0ede6;
    margin-bottom: 0.8rem;
  }
  .hero-title em { font-style: italic; color: #9FE1CB; }
  .hero-desc {
    font-family: 'Courier Prime', monospace;
    font-size: 13px;
    color: rgba(240,237,230,0.6);
    max-width: 460px;
    line-height: 1.75;
    margin-bottom: 1.5rem;
  }
  .hero-stat { display: flex; gap: 2rem; }
  .stat { display: flex; flex-direction: column; gap: 3px; }
  .stat-n {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: #f0ede6;
    line-height: 1;
  }
  .stat-l {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.4);
  }

  /* ── SHELF DIVIDER ── */
  .shelf-divider {
    width: 100%;
    height: 18px;
    background: #1a1a16;
    border-top: 2.5px solid #3a3028;
    border-bottom: 1px solid #111;
    box-shadow: 0 4px 0 #0a0a08;
    position: relative;
  }
  .shelf-divider::before {
    content: '';
    position: absolute;
    bottom: -5px; left: 0; right: 0;
    height: 4px;
    background: #0a0a08;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    background: #111110;
    border-bottom: 1px solid #2a2a24;
    padding: 0 2.5rem;
    display: flex;
    align-items: center;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .filter-label {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.35);
    padding: 0 1.2rem 0 0;
    border-right: 1px solid #2a2a24;
    margin-right: 0;
    white-space: nowrap;
    height: 46px;
    display: flex;
    align-items: center;
  }
  .filter-tabs {
    display: flex;
    gap: 0;
    flex: 1;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-tabs::-webkit-scrollbar { display: none; }
  .ftab {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.4);
    padding: 0 1.1rem;
    height: 46px;
    display: flex;
    align-items: center;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    transition: color 0.15s, border-color 0.15s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
  }
  .ftab:hover { color: rgba(240,237,230,0.75); }
  .ftab.active {
    color: #9FE1CB;
    border-bottom-color: #1D9E75;
  }
  .search-wrap {
    border-left: 1px solid #2a2a24;
    padding: 0 0 0 1rem;
    display: flex;
    align-items: center;
    height: 46px;
  }
  .search-input {
    background: transparent;
    border: none;
    outline: none;
    font-family: 'Courier Prime', monospace;
    font-size: 11px;
    color: #f0ede6;
    letter-spacing: 0.05em;
    width: 160px;
  }
  .search-input::placeholder {
    color: rgba(240,237,230,0.25);
    font-style: italic;
  }

  /* ── BODY ── */
  .body-wrap {
    padding: 0 0 5rem;
    background: #0d0d0b;
  }

  /* ── SHELF SECTION ── */
  .shelf-section {
    margin-bottom: 0;
  }
  .shelf-label-row {
    display: flex;
    align-items: center;
    padding: 1.4rem 2.5rem 1rem;
    gap: 0.75rem;
  }
  .shelf-num {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: #1D9E75;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .shelf-name {
    font-family: 'Courier Prime', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.35);
    flex: 1;
  }
  .shelf-count {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: rgba(240,237,230,0.25);
    letter-spacing: 0.1em;
  }

  /* ── SHELF ── */
  .shelf-surface {
    position: relative;
    padding: 0 2.5rem 0;
    margin-bottom: 0;
  }
  .shelf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0;
    border-left: 1px solid #222220;
    border-top: 1px solid #222220;
  }

  /* ── CARD ── */
  .card {
    display: block;
    text-decoration: none;
    background: #111110;
    border-right: 1px solid #222220;
    border-bottom: 1px solid #222220;
    overflow: hidden;
    transition: background 0.15s;
    animation: fadeUp 0.5s ease both;
  }
  .card:hover { background: #181816; }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0d1612;
    overflow: hidden;
    position: relative;
  }
  .card-thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.3s;
    filter: saturate(0.7) brightness(0.9);
  }
  .card:hover .card-thumb img { filter: saturate(0.9) brightness(1); }
  .fallback {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #0d1612;
  }

  /* spine accent line */
  .card-spine {
    width: 100%;
    height: 3px;
    background: #1a1a14;
    border-top: 1px solid #2a2a20;
  }

  .card-body {
    padding: 0.7rem 0.85rem 0.8rem;
  }
  .card-call {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    color: #1D9E75;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 700;
  }
  .card-name {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    font-weight: 400;
    color: rgba(240,237,230,0.7);
    line-height: 1.5;
  }
  .card:hover .card-name { color: #f0ede6; }
  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    padding-top: 7px;
    border-top: 0.5px solid #1e1e1c;
  }
  .card-topic {
    font-family: 'Courier Prime', monospace;
    font-size: 9px;
    letter-spacing: 0.08em;
    color: rgba(240,237,230,0.25);
    text-transform: uppercase;
  }
  .arrow-icon {
    width: 14px; height: 14px;
    color: #2a2a24;
    transition: color 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .card:hover .arrow-icon {
    color: #1D9E75;
    transform: translate(2px, -2px);
  }

  /* ── SHELF BOTTOM WOOD ── */
  .shelf-wood {
    width: 100%;
    height: 12px;
    background: #1c1a14;
    border-top: 1.5px solid #3a3428;
    border-bottom: 1px solid #0a0a08;
    margin: 0 2.5rem;
    width: calc(100% - 5rem);
  }

  /* ── EMPTY STATE ── */
  .empty {
    font-family: 'Courier Prime', monospace;
    font-size: 12px;
    color: rgba(240,237,230,0.3);
    font-style: italic;
    text-align: center;
    padding: 3rem 2.5rem;
    letter-spacing: 0.05em;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-tag">Thesis Research · Oakland, CA</span>
    <h1 class="hero-title">Oakland<br><em>Map Library</em></h1>
    <p class="hero-desc">A curated collection of interactive maps, story maps, and spatial analyses exploring equity, environment, and community.</p>
    <div class="hero-stat">
      <div class="stat"><span class="stat-n">16</span><span class="stat-l">Maps</span></div>
      <div class="stat"><span class="stat-n">7+</span><span class="stat-l">Topics</span></div>
      <div class="stat"><span class="stat-n">OAK</span><span class="stat-l">Focus Area</span></div>
    </div>
  </div>
</header>

<div class="shelf-divider"></div>

<nav class="filter-bar">
  <span class="filter-label">Filter</span>
  <div class="filter-tabs" id="filter-tabs">
    <button class="ftab active" data-filter="all">All Maps</button>
    <button class="ftab" data-filter="equity">Equity</button>
    <button class="ftab" data-filter="environment">Environment</button>
    <button class="ftab" data-filter="infrastructure">Infrastructure</button>
    <button class="ftab" data-filter="community">Community</button>
    <button class="ftab" data-filter="storymap">StoryMap</button>
  </div>
  <div class="search-wrap">
    <input class="search-input" type="text" id="search" placeholder="search catalog...">
  </div>
</nav>

<div class="body-wrap" id="body"></div>

<script>
const maps = [
  {n:1,  title:"Gentrification & Food Apartheid",                    url:"https://coagis.maps.arcgis.com/apps/MapSeries/index.html?appid=c7ff2c218cef4d789c6414ddaf2c60d1",  topic:"equity",          tags:["equity"]},
  {n:2,  title:"Green Infrastructure: Y-Plan Oakland",               url:"https://storymaps.arcgis.com/stories/b383221f37274ebaa4909f2ee5c84e43",                          topic:"environment",     tags:["environment","storymap"]},
  {n:3,  title:"Oakland Logistics Center Map",                       url:"https://atlas.colliers.com/portal/apps/mapviewer/index.html?webmap=edb7c0afb49745be841eba76d2e4a142",topic:"infrastructure",  tags:["infrastructure"]},
  {n:4,  title:"Slow Violence against Black West Oakland Residents",  url:"https://storymaps.arcgis.com/stories/c3a5b0ef53b645039660041f535a7a66",                          topic:"equity",          tags:["equity","storymap"]},
  {n:5,  title:"Analyzing Environmental Vulnerabilities in Oakland",  url:"https://storymaps.arcgis.com/stories/e084837b1cb0446b99972776593262c7",                          topic:"environment",     tags:["environment","storymap"]},
  {n:6,  title:"Oakland BayWheels Expansion",                        url:"https://storymaps.arcgis.com/stories/e265142ca71e43a9b5e4e1be71c9df08",                          topic:"infrastructure",  tags:["infrastructure","storymap"]},
  {n:7,  title:"Invisible Boundaries: Oakland, California",          url:"https://storymaps.arcgis.com/stories/ca8edd72eb6646b79399dbd14d0e2dbd",                          topic:"equity",          tags:["equity","storymap"]},
  {n:8,  title:"Climate Equity Progress in Oakland",                 url:"https://storymaps.arcgis.com/collections/24303e1c749649deae2d4badf22a87b4",                      topic:"environment",     tags:["environment","equity","storymap"]},
  {n:9,  title:"The Lines That Shape Our Cities",                    url:"https://storymaps.arcgis.com/stories/0f58d49c566b486482b3e64e9e5f7ac9",                          topic:"equity",          tags:["equity","storymap"]},
  {n:10, title:"Lived History of EJ Oakland, CA",                    url:"https://storymaps.arcgis.com/stories/0f40bd51be894a86b3f8b77dcbee07db",                          topic:"community",       tags:["community","storymap"]},
  {n:11, title:"Oakland, California",                                url:"https://storymaps.arcgis.com/stories/73ab1bb212cf40df8a22a7451427f0b9",                          topic:"community",       tags:["community","storymap"]},
  {n:12, title:"Oakland Storymap",                                   url:"https://storymaps.arcgis.com/stories/c080aabbae3044f7800cb63bb15d8a2e",                          topic:"community",       tags:["community","storymap"]},
  {n:13, title:"Oakland, CA StoryMap",                               url:"https://storymaps.arcgis.com/stories/3e130fc9ae0841cba5919cfd45e5aaa0",                          topic:"community",       tags:["community","storymap"]},
  {n:14, title:"Oakland Community Power Map",                        url:"https://www.arcgis.com/apps/StoryMapCrowdsource/index.html?appid=0afabf23879a42f291deba308afc1831",topic:"community",      tags:["community"]},
  {n:15, title:"Hoodmaps",                                           url:"https://hoodmaps.com/oakland-neighborhood-map",                                                   topic:"community",       tags:["community"]},
  {n:16, title:"Falling Fruit",                                      url:"https://fallingfruit.org/",                                                                       topic:"environment",     tags:["environment","community"]},
];

const imgBase = "https://raw.githubusercontent.com/franch7777/vscode/main/lib/";
const topicLabels = { equity:"Equity", environment:"Environment", infrastructure:"Infrastructure", community:"Community", storymap:"StoryMap" };

const fallbackSVG = `<svg width="28" height="28" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="7" width="30" height="22" rx="2" stroke="#1D9E75" stroke-width="1.5"/><path d="M3 13l8-4 8 4 8-4 8 4" stroke="#1D9E75" stroke-width="1.5" stroke-linejoin="round"/><circle cx="13" cy="20" r="2.5" stroke="#1D9E75" stroke-width="1.5"/><path d="M13 22.5v4" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const arrowSVG = `<svg class="arrow-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 14L14 4M14 4H7M14 4v7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

const spineColors = {
  equity: '#2d1a0e',
  environment: '#0d1f16',
  infrastructure: '#0e1422',
  community: '#1a0e22',
  storymap: '#1a1a0e',
};

function buildLibrary(filtered) {
  const body = document.getElementById('body');
  body.innerHTML = '';

  if (filtered.length === 0) {
    body.innerHTML = '<p class="empty">[ no maps found in this section ]</p>';
    return;
  }

  const groups = {};
  filtered.forEach(m => {
    const t = m.topic;
    if (!groups[t]) groups[t] = [];
    groups[t].push(m);
  });

  const sectionOrder = ['equity','environment','infrastructure','community','storymap'];
  const seen = new Set();

  Object.keys(groups).sort((a,b) => sectionOrder.indexOf(a) - sectionOrder.indexOf(b)).forEach((topic, si) => {
    const items = groups[topic];
    const section = document.createElement('div');
    section.className = 'shelf-section';

    const labelRow = document.createElement('div');
    labelRow.className = 'shelf-label-row';
    labelRow.innerHTML = `<span class="shelf-num">§ ${String(si+1).padStart(2,'0')}</span><span class="shelf-name">${topicLabels[topic] || topic}</span><span class="shelf-count">${items.length} item${items.length===1?'':'s'}</span>`;
    section.appendChild(labelRow);

    const surf = document.createElement('div');
    surf.className = 'shelf-surface';
    const grid = document.createElement('div');
    grid.className = 'shelf-grid';

    items.forEach((m, i) => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = m.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = `${i * 0.05}s`;

      const spineColor = spineColors[topic] || '#1a1a14';
      const thumb = document.createElement('div');
      thumb.className = 'card-thumb';
      const fb = document.createElement('div');
      fb.className = 'fallback';
      fb.innerHTML = fallbackSVG;
      thumb.appendChild(fb);
      const img = document.createElement('img');
      img.src = imgBase + m.n + '.png';
      img.alt = m.title;
      img.onload = () => { img.style.opacity = '1'; fb.style.display = 'none'; };
      img.onerror = () => { img.style.display = 'none'; };
      thumb.appendChild(img);

      const spine = document.createElement('div');
      spine.className = 'card-spine';
      spine.style.background = spineColor;

      const cbody = document.createElement('div');
      cbody.className = 'card-body';
      cbody.innerHTML = `<div class="card-call">MAP ${String(m.n).padStart(3,'0')}</div><div class="card-name">${m.title}</div><div class="card-footer"><span class="card-topic">${topicLabels[m.topic]||m.topic}</span>${arrowSVG}</div>`;

      a.appendChild(thumb);
      a.appendChild(spine);
      a.appendChild(cbody);
      grid.appendChild(a);
    });

    surf.appendChild(grid);
    section.appendChild(surf);

    const wood = document.createElement('div');
    wood.className = 'shelf-wood';
    section.appendChild(wood);

    body.appendChild(section);
  });
}

let activeFilter = 'all';
let searchQuery = '';

function applyFilters() {
  let filtered = maps.filter(m => {
    const matchFilter = activeFilter === 'all' || m.tags.includes(activeFilter);
    const q = searchQuery.toLowerCase();
    const matchSearch = !q || m.title.toLowerCase().includes(q) || m.topic.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
  buildLibrary(filtered);
}

document.querySelectorAll('.ftab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    applyFilters();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  applyFilters();
});

buildLibrary(maps);
</script>
</body>
</html>
