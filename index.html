<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oakland Map Library</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Outfit', sans-serif;
    background: #0d0d0b;
    color: #f0ede6;
    min-height: 100vh;
  }

  .hero {
    position: relative;
    width: 100%;
    min-height: 420px;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background-image: url('https://raw.githubusercontent.com/franch7777/vscode/main/lib/back.png');
    background-size: cover;
    background-position: center;
    filter: brightness(0.55) saturate(0.8);
    transform: scale(1.04);
    transition: transform 8s ease;
  }

  .hero:hover .hero-bg {
    transform: scale(1.0);
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(13,13,11,0.1) 0%,
      rgba(13,13,11,0.15) 40%,
      rgba(13,13,11,0.85) 100%
    );
  }

  .hero-content {
    position: relative;
    z-index: 2;
    padding: 2.5rem 2.5rem 3rem;
    max-width: 900px;
    animation: fadeUp 0.9s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .hero-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #9FE1CB;
    border: 0.5px solid #1D9E75;
    border-radius: 20px;
    padding: 4px 12px;
    margin-bottom: 1.25rem;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.6rem, 6vw, 4.5rem);
    font-weight: 400;
    line-height: 1.05;
    letter-spacing: -1px;
    color: #f0ede6;
    margin-bottom: 1rem;
  }

  .hero-title em {
    font-style: italic;
    color: #9FE1CB;
  }

  .hero-desc {
    font-size: 15px;
    font-weight: 300;
    color: rgba(240,237,230,0.7);
    max-width: 480px;
    line-height: 1.7;
  }

  .hero-stat {
    display: flex;
    gap: 2rem;
    margin-top: 2rem;
  }

  .stat { display: flex; flex-direction: column; gap: 2px; }

  .stat-n {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    color: #f0ede6;
    line-height: 1;
  }

  .stat-l {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(240,237,230,0.45);
  }

  .body-wrap {
    padding: 2.5rem 2.5rem 5rem;
    background: #0d0d0b;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #1D9E75;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-label::after {
    content: '';
    display: block;
    flex: 1;
    height: 0.5px;
    background: #222220;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 1rem;
  }

  .card {
    display: block;
    text-decoration: none;
    background: #161614;
    border: 0.5px solid #2a2a27;
    border-radius: 10px;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.2s, background 0.2s;
    animation: fadeUp 0.6s ease both;
  }

  .card:hover {
    border-color: #1D9E75;
    transform: translateY(-3px);
    background: #1a1a17;
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16 / 10;
    background: #111f1a;
    overflow: hidden;
    position: relative;
  }

  .card-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    opacity: 0;
    transition: opacity 0.3s;
    filter: saturate(0.85);
  }

  .card:hover .card-thumb img { filter: saturate(1); }

  .fallback {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111f1a;
  }

  .card-body {
    padding: 0.8rem 1rem 1rem;
    border-top: 0.5px solid #222220;
  }

  .card-num {
    font-size: 9px;
    color: #1D9E75;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
    font-weight: 500;
  }

  .card-name {
    font-size: 13px;
    font-weight: 400;
    color: #d4d0c8;
    line-height: 1.45;
  }

  .card:hover .card-name { color: #f0ede6; }

  .card-arrow {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }

  .arrow-icon {
    width: 18px;
    height: 18px;
    color: #333330;
    transition: color 0.2s, transform 0.2s;
  }

  .card:hover .arrow-icon {
    color: #1D9E75;
    transform: translate(2px, -2px);
  }
</style>
</head>
<body>

<header class="hero">
  <div class="hero-bg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <span class="hero-tag">Thesis Research · Oakland, CA</span>
    <h1 class="hero-title">Oakland<br><em>Map Library</em></h1>
    <p class="hero-desc">A curated collection of interactive maps, story maps, and spatial analyses exploring equity, environment, and community.</p>
    <div class="hero-stat">
      <div class="stat">
        <span class="stat-n">16</span>
        <span class="stat-l">Maps</span>
      </div>
      <div class="stat">
        <span class="stat-n">7+</span>
        <span class="stat-l">Topics</span>
      </div>
      <div class="stat">
        <span class="stat-n">OAK</span>
        <span class="stat-l">Focus Area</span>
      </div>
    </div>
  </div>
</header>

<div class="body-wrap">
  <p class="section-label">All maps</p>
  <div class="grid" id="map-grid"></div>
</div>

<script>
const maps = [
  {n:1,  title:"Gentrification & Food Apartheid",                    url:"https://coagis.maps.arcgis.com/apps/MapSeries/index.html?appid=c7ff2c218cef4d789c6414ddaf2c60d1"},
  {n:2,  title:"Green Infrastructure: Y-Plan Oakland",               url:"https://storymaps.arcgis.com/stories/b383221f37274ebaa4909f2ee5c84e43"},
  {n:3,  title:"Oakland Logistics Center Map",                       url:"https://atlas.colliers.com/portal/apps/mapviewer/index.html?webmap=edb7c0afb49745be841eba76d2e4a142"},
  {n:4,  title:"Slow Violence against Black West Oakland Residents", url:"https://storymaps.arcgis.com/stories/c3a5b0ef53b645039660041f535a7a66"},
  {n:5,  title:"Analyzing Environmental Vulnerabilities in Oakland", url:"https://storymaps.arcgis.com/stories/e084837b1cb0446b99972776593262c7"},
  {n:6,  title:"Oakland BayWheels Expansion",                       url:"https://storymaps.arcgis.com/stories/e265142ca71e43a9b5e4e1be71c9df08"},
  {n:7,  title:"Invisible Boundaries: Oakland, California",         url:"https://storymaps.arcgis.com/stories/ca8edd72eb6646b79399dbd14d0e2dbd"},
  {n:8,  title:"Climate Equity Progress in Oakland",                url:"https://storymaps.arcgis.com/collections/24303e1c749649deae2d4badf22a87b4"},
  {n:9,  title:"The Lines That Shape Our Cities",                   url:"https://storymaps.arcgis.com/stories/0f58d49c566b486482b3e64e9e5f7ac9"},
  {n:10, title:"Lived History of EJ Oakland, CA",                   url:"https://storymaps.arcgis.com/stories/0f40bd51be894a86b3f8b77dcbee07db"},
  {n:11, title:"Oakland, California",                               url:"https://storymaps.arcgis.com/stories/73ab1bb212cf40df8a22a7451427f0b9"},
  {n:12, title:"Oakland Storymap",                                  url:"https://storymaps.arcgis.com/stories/c080aabbae3044f7800cb63bb15d8a2e"},
  {n:13, title:"Oakland, CA StoryMap",                              url:"https://storymaps.arcgis.com/stories/3e130fc9ae0841cba5919cfd45e5aaa0"},
  {n:14, title:"Oakland Community Power Map",                       url:"https://www.arcgis.com/apps/StoryMapCrowdsource/index.html?appid=0afabf23879a42f291deba308afc1831"},
  {n:15, title:"Hoodmaps",                                          url:"https://hoodmaps.com/oakland-neighborhood-map"},
  {n:16, title:"Falling Fruit",                                     url:"https://fallingfruit.org/"}
];

const imgBase = "https://raw.githubusercontent.com/franch7777/vscode/main/lib/";
const grid = document.getElementById('map-grid');

const fallbackSVG = `<svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="7" width="30" height="22" rx="2" stroke="#1D9E75" stroke-width="1.5"/><path d="M3 13l8-4 8 4 8-4 8 4" stroke="#1D9E75" stroke-width="1.5" stroke-linejoin="round"/><circle cx="13" cy="20" r="2.5" stroke="#1D9E75" stroke-width="1.5"/><path d="M13 22.5v4" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/></svg>`;

const arrowSVG = `<svg class="arrow-icon" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 14L14 4M14 4H7M14 4v7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

maps.forEach((m, i) => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = m.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';
  a.style.animationDelay = `${i * 0.04}s`;

  const thumb = document.createElement('div');
  thumb.className = 'card-thumb';

  const fb = document.createElement('div');
  fb.className = 'fallback';
  fb.innerHTML = fallbackSVG;
  thumb.appendChild(fb);

  const img = document.createElement('img');
  img.src = imgBase + m.n + '.png';
  img.alt = m.title;
  img.onload = () => { img.style.opacity = '1'; fb.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none'; };
  thumb.appendChild(img);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `<div class="card-num">Map ${String(m.n).padStart(2,'0')}</div><div class="card-name">${m.title}</div><div class="card-arrow">${arrowSVG}</div>`;

  a.appendChild(thumb);
  a.appendChild(body);
  grid.appendChild(a);
});
</script>
</body>
</html>
