<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oakland Map Library</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #fafaf8; color: #1a1a18; padding: 0 2rem; }
  .lib-header { padding: 3rem 0 2.5rem; border-bottom: 0.5px solid #e0ddd6; margin-bottom: 2.5rem; }
  .lib-meta { font-size: 11px; color: #888780; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 0.75rem; }
  .lib-title { font-family: 'DM Serif Display', serif; font-size: 3rem; font-weight: 400; line-height: 1.05; letter-spacing: -0.5px; margin-bottom: 0.85rem; }
  .lib-title em { font-style: italic; color: #1D9E75; }
  .lib-desc { font-size: 15px; color: #5F5E5A; max-width: 520px; line-height: 1.65; font-weight: 300; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.25rem; padding-bottom: 4rem; }
  .card { display: block; text-decoration: none; background: #fff; border: 0.5px solid #dedad2; border-radius: 12px; overflow: hidden; transition: border-color 0.15s, transform 0.15s; }
  .card:hover { border-color: #aaa89e; transform: translateY(-2px); }
  .card-thumb { width: 100%; aspect-ratio: 16 / 10; background: #E1F5EE; overflow: hidden; position: relative; }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; transition: opacity 0.2s; }
  .fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: #E1F5EE; }
  .card-body { padding: 0.75rem 1rem 1rem; }
  .card-num { font-size: 10px; color: #aaa89e; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .card-name { font-size: 13px; font-weight: 500; color: #1a1a18; line-height: 1.4; }
</style>
</head>
<body>

<div class="lib-header">
  <p class="lib-meta">Thesis Research · Oakland, CA</p>
  <h1 class="lib-title">Oakland<br><em>Map Library</em></h1>
  <p class="lib-desc">A curated collection of interactive maps, story maps, and spatial analyses exploring equity, environment, and community in Oakland, California.</p>
</div>

<div class="grid" id="map-grid"></div>

<script>
const maps = [
  {n:1,  title:"Gentrification & Food Apartheid",                       url:"https://coagis.maps.arcgis.com/apps/MapSeries/index.html?appid=c7ff2c218cef4d789c6414ddaf2c60d1"},
  {n:2,  title:"Green Infrastructure: Y-Plan Oakland",                  url:"https://storymaps.arcgis.com/stories/b383221f37274ebaa4909f2ee5c84e43"},
  {n:3,  title:"Oakland Logistics Center Map",                          url:"https://atlas.colliers.com/portal/apps/mapviewer/index.html?webmap=edb7c0afb49745be841eba76d2e4a142"},
  {n:4,  title:"Slow Violence against Black West Oakland Residents",    url:"https://storymaps.arcgis.com/stories/c3a5b0ef53b645039660041f535a7a66"},
  {n:5,  title:"Analyzing Environmental Vulnerabilities in Oakland",    url:"https://storymaps.arcgis.com/stories/e084837b1cb0446b99972776593262c7"},
  {n:6,  title:"Oakland BayWheels Expansion",                          url:"https://storymaps.arcgis.com/stories/e265142ca71e43a9b5e4e1be71c9df08"},
  {n:7,  title:"Invisible Boundaries: Oakland, California",            url:"https://storymaps.arcgis.com/stories/ca8edd72eb6646b79399dbd14d0e2dbd"},
  {n:8,  title:"Climate Equity Progress in Oakland",                   url:"https://storymaps.arcgis.com/collections/24303e1c749649deae2d4badf22a87b4"},
  {n:9,  title:"The Lines That Shape Our Cities",                      url:"https://storymaps.arcgis.com/stories/0f58d49c566b486482b3e64e9e5f7ac9"},
  {n:10, title:"Lived History of EJ Oakland, CA",                      url:"https://storymaps.arcgis.com/stories/0f40bd51be894a86b3f8b77dcbee07db"},
  {n:11, title:"Oakland, California",                                  url:"https://storymaps.arcgis.com/stories/73ab1bb212cf40df8a22a7451427f0b9"},
  {n:12, title:"Oakland Storymap",                                     url:"https://storymaps.arcgis.com/stories/c080aabbae3044f7800cb63bb15d8a2e"},
  {n:13, title:"Oakland, CA StoryMap",                                 url:"https://storymaps.arcgis.com/stories/3e130fc9ae0841cba5919cfd45e5aaa0"},
  {n:14, title:"Oakland Community Power Map",                          url:"https://www.arcgis.com/apps/StoryMapCrowdsource/index.html?appid=0afabf23879a42f291deba308afc1831"},
  {n:15, title:"Hoodmaps",                                             url:"https://hoodmaps.com/oakland-neighborhood-map"},
  {n:16, title:"Falling Fruit",                                        url:"https://fallingfruit.org/"}
];

const imgBase = "https://raw.githubusercontent.com/franch7777/vscode/main/lib/";
const grid = document.getElementById('map-grid');

const fallbackSVG = `<svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="7" width="30" height="22" rx="2" stroke="#0F6E56" stroke-width="1.5"/><path d="M3 13l8-4 8 4 8-4 8 4" stroke="#0F6E56" stroke-width="1.5" stroke-linejoin="round"/><circle cx="13" cy="20" r="2.5" stroke="#0F6E56" stroke-width="1.5"/><path d="M13 22.5v4" stroke="#0F6E56" stroke-width="1.5" stroke-linecap="round"/></svg>`;

maps.forEach(m => {
  const a = document.createElement('a');
  a.className = 'card';
  a.href = m.url;
  a.target = '_blank';
  a.rel = 'noopener noreferrer';

  const thumb = document.createElement('div');
  thumb.className = 'card-thumb';

  const fb = document.createElement('div');
  fb.className = 'fallback';
  fb.innerHTML = fallbackSVG;
  thumb.appendChild(fb);

  const img = document.createElement('img');
  img.src = imgBase + m.n + '.png';
  img.alt = m.title;
  img.style.opacity = '0';
  img.onload = () => { img.style.opacity = '1'; fb.style.display = 'none'; };
  img.onerror = () => { img.style.display = 'none'; };
  thumb.appendChild(img);

  const body = document.createElement('div');
  body.className = 'card-body';
  body.innerHTML = `<div class="card-num">Map ${String(m.n).padStart(2,'0')}</div><div class="card-name">${m.title}</div>`;

  a.appendChild(thumb);
  a.appendChild(body);
  grid.appendChild(a);
});
</script>
</body>
</html>
